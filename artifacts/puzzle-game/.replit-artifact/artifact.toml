kind = "web"
previewPath = "/"
title = "퍼즐 게임"
version = "1.0.0"
id = "artifacts/puzzle-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23141

[services.development]
run = "pnpm --filter @workspace/puzzle-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/puzzle-game", "run", "build" ]
publicDir = "artifacts/puzzle-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23141"
BASE_PATH = "/"
